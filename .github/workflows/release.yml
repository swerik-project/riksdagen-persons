name: Release new version

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8]

    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/actions/checkout
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyriksdagen
        pip install cycler
        pip install pandas==2.3.3 xlsxwriter

    - name: dump stuff
      run: |
        mkdir dumps
        ls
        ls dumps
        VERSION=$(echo ${{ github.ref }} | cut -d "v" -f 2 | xargs)
        python .github/workflows/release/dump-merged-meta-tables.py
        ls
        ls dumps
        python .github/workflows/release/dump-chair-data.py --version $VERSION
        ls
        ls dumps
        python -c 'from pyriksdagen.reference_handling import compile_bib_list; compile_bib_list(output_file="dumps/reference-list.bib")'
        ls
        ls dumps

    - name: Clone scripts repo
      run: |
        git clone -b parliament_year https://github.com/swerik-project/scripts.git

    - name: Process data
      run: |
        python scripts/src/wikidata_process.py --formats xlsx sqlite
        mv RiksdagenPersons.db riksdagen_persons.sqlite
        mv RiksdagenPersons.xlsx riksdagen_persons.xlsx

    - name: zip dumps
      run: zip -r dumps.zip dumps

    - name: Zip metadata
      run: zip -r persons.zip data

    - name: zip quality estimates
      run: zip -r quality.zip quality/estimates

    - name: Upload artifacts to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./*.zip
        tag: ${{ github.ref }}
        file_glob: true

    - name: Upload XLSX to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./riksdagen_persons.xlsx
        tag: ${{ github.ref }}

    - name: Upload sqlite DB to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./riksdagen_persons.sqlite
        tag: ${{ github.ref }}
