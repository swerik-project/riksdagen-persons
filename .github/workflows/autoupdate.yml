name: "Riksdagen Persons: update from Wikidata"

on:
  push:
    branches:
      - 'autoupdate'
jobs:
  autoupdate:
    if: "!contains(github.event.head_commit.message, 'SKIP CI')"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Debug refs
      run: |
        echo "head_ref: ${{ github.head_ref }}"
        echo "base_ref: ${{ github.base_ref }}"
        echo "ref: ${{ github.ref }}"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        git clone -b parliament_year https://github.com/swerik-project/pyriksdagen.git
        pip install ./pyriksdagen
        pip install sample-git-diffs
        pip install pandas==2.3.3
    - name: Clone scripts repo
      run: |
        git clone -b parliament_year https://github.com/swerik-project/scripts.git

    - name: Make directories
      run: |
        mkdir -p input/metadata
        mkdir input/matching

    - name: Download new data
      run: |
        python scripts/src/wikidata_query.py --source member_of_parliament

    - name: Process newly downloaded data to make sure the structure is correct
      run: |
        cp data/meeting.csv data/riksdag-year.csv
        python scripts/src/wikidata_process.py --formats csv

    - name: Process party affiliation
      run: |
        python scripts/src/SWERIK-ID/map-party-affiliation.py
        python scripts/src/SWERIK-ID/update-party-affiliation.py

    - name: Check diffs
      run: |
        git diff --stat

    - name: Sample git diffs
      run: |
        sample-git-diffs --n 20 > AUTOMATIC.diff
        diff2markdown --path AUTOMATIC.diff --reponame riksdagen-persons --branch autoupdate --username swerik-project > AUTOMATIC.md
        head --lines 20 AUTOMATIC.md
    - name: Push new files
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git checkout data/riksdag-year.csv
        git add data
        git commit -m "feat: fetch new data from wikidata [SKIP CI]"
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref_name }}


